<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title if title else "NH3 Lifetime" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-950 text-slate-100">
    <div class="min-h-screen">
      <header class="border-b border-slate-800 bg-slate-950/60 backdrop-blur">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-slate-800 flex items-center justify-center font-semibold">NH3</div>
            <div>
              <div class="text-lg font-semibold">NH3 Lifetime Monitor</div>
              <div class="text-sm text-slate-400">ETL + Análises + Gráficos</div>
            </div>
          </div>
          <a class="text-sm text-slate-300 hover:text-white" href="/docs">API Docs</a>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
      </main>

      <footer class="max-w-6xl mx-auto px-6 py-10 text-sm text-slate-500">
        FastAPI + PostgreSQL + Pandas/Matplotlib
      </footer>
    </div>
  </body>
</html>
